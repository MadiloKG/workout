<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BANKAI">
<meta name="theme-color" content="#000000">
<title>BANKAI</title>
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{
  --bg:#000;--s1:#0c0c0c;--s2:#141414;--s3:#1c1c1c;
  --b1:rgba(89,112,129,.2);--b2:rgba(89,112,129,.38);
  --steel:#597081;--steel2:#7a95a8;--steel3:#9db3c0;
  --light:#D2D2D2;--light2:#e8e8e8;
  --text:#f0f0f0;--muted:#597081;--muted2:#8a9fa8;
  --safe-top:env(safe-area-inset-top);
  --safe-bot:env(safe-area-inset-bottom);
  --safe-l:env(safe-area-inset-left);
  --safe-r:env(safe-area-inset-right);
  --hdr-h:112px;
  --tab-h:50px;
}
html{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Sans',sans-serif;
  height:100%;overflow:hidden;
  display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}

/* ── FIXED HEADER ── */
.hdr{
  flex-shrink:0;
  background:rgba(0,0,0,.92);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--b1);
  padding-top:var(--safe-top);
  padding-left:var(--safe-l);
  padding-right:var(--safe-r);
  z-index:100;
}
.hdr-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 0;gap:8px;
}
.logo{display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--steel);display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0}
.logo-text{font-family:'Bebas Neue';font-size:1.35rem;letter-spacing:5px;color:var(--light)}
.week-pill{background:rgba(89,112,129,.1);border:1px solid var(--b1);border-radius:99px;padding:3px 11px;text-align:center;flex-shrink:0}
.week-num{font-family:'Bebas Neue';font-size:.82rem;letter-spacing:2px;color:var(--steel2);line-height:1.1}
.week-date{font-size:.55rem;color:var(--muted);letter-spacing:.3px}
.hdr-btns{display:flex;gap:5px}
.hbtn{
  height:34px;min-width:34px;border-radius:9px;border:1px solid var(--b1);
  background:rgba(255,255,255,.03);color:var(--muted2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;padding:0 8px;font-family:'DM Sans';white-space:nowrap;
  -webkit-user-select:none;user-select:none;
  transition:background .1s,transform .1s;
}
.hbtn:active{background:rgba(89,112,129,.22);transform:scale(.91)}
.hbtn-accent{background:var(--steel);color:#000;border-color:transparent;font-weight:700;font-size:.7rem;letter-spacing:.4px;padding:0 12px}
.hbtn-accent:active{background:var(--steel2)}

/* ── TABS ── */
.tabs{
  display:flex;overflow-x:auto;scrollbar-width:none;
  padding:8px 14px 0;gap:0;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:1;min-width:64px;
  padding:8px 4px 10px;border:none;
  background:transparent;
  font-family:'Bebas Neue';font-size:.78rem;letter-spacing:2px;
  cursor:pointer;border-bottom:2px solid transparent;
  color:var(--muted);white-space:nowrap;
  transition:color .15s,border-color .15s;
  -webkit-user-select:none;user-select:none;
}
.tab.active{color:var(--light);border-color:var(--steel)}

/* ── PROGRESS STRIP ── */
.pg-strip{
  flex-shrink:0;
  background:rgba(0,0,0,.85);
  border-bottom:1px solid var(--b1);
  padding:8px 14px;
  padding-left:calc(14px + var(--safe-l));
  padding-right:calc(14px + var(--safe-r));
}
.pg-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.pg-left{display:flex;align-items:baseline;gap:4px}
.pg-n{font-family:'Bebas Neue';font-size:.95rem;color:var(--light)}
.pg-t{font-size:.68rem;color:var(--muted)}
.pg-pct{font-family:'Bebas Neue';font-size:.8rem;color:var(--steel2)}
.pg-track{height:2px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.pg-fill{height:100%;background:linear-gradient(90deg,var(--steel),var(--light));border-radius:99px;transition:width .35s ease}
.pg-day{font-size:.6rem;color:var(--muted);margin-top:4px;letter-spacing:.4px}

/* ── SCROLL AREA ── */
.scroll-area{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior-y:contain;
  padding:12px 12px calc(var(--safe-bot) + 24px);
  padding-left:calc(12px + var(--safe-l));
  padding-right:calc(12px + var(--safe-r));
}

/* ── CARDS — single column on mobile ── */
.grid{display:flex;flex-direction:column;gap:10px;max-width:600px;margin:0 auto}

/* ── CARD ── */
.card{
  background:var(--s1);
  border:1px solid var(--b1);
  border-radius:16px;overflow:hidden;
  position:relative;
}
.card-line{height:1px;background:linear-gradient(90deg,var(--steel),rgba(89,112,129,.1),transparent)}
.card-body{padding:12px 12px 10px;display:flex;flex-direction:column;gap:9px}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.card-name{font-family:'Bebas Neue';font-size:1.08rem;letter-spacing:1px;line-height:1.15;color:var(--light2)}
.card-muscle{font-size:.64rem;color:var(--muted2);margin-top:2px;display:flex;align-items:center;gap:3px}
.card-muscle::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--steel);display:inline-block;flex-shrink:0}
.zone-badge{padding:3px 9px;border-radius:99px;font-size:.6rem;font-weight:700;letter-spacing:.7px;white-space:nowrap;flex-shrink:0}

/* ── SETS TABLE — optimized touch ── */
.sets-table{border:1px solid var(--b1);border-radius:12px;overflow:hidden}
.sets-hdr{
  display:grid;grid-template-columns:24px 1fr 1fr 1fr 40px;
  background:rgba(89,112,129,.07);
  padding:6px 10px;border-bottom:1px solid var(--b1);
}
.sets-hdr span{font-size:.57rem;color:var(--muted);letter-spacing:.8px;text-align:center;font-weight:600}
.sets-hdr span:first-child{text-align:left}
.set-row{
  display:grid;grid-template-columns:24px 1fr 1fr 1fr 40px;
  padding:0 10px;align-items:center;
  border-bottom:1px solid rgba(89,112,129,.07);
  min-height:48px;/* comfortable touch target */
  transition:background .15s;
}
.set-row:last-child{border-bottom:none}
.set-row.done{background:rgba(89,112,129,.06)}
.set-n{font-family:'Bebas Neue';font-size:.8rem;color:var(--muted);line-height:1}
/* Big touch-friendly inputs */
.si{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(89,112,129,.15);
  border-radius:8px;
  color:var(--text);
  font-family:'DM Sans';font-size:.85rem;font-weight:600;
  text-align:center;
  padding:7px 2px;
  width:calc(100% - 6px);
  margin:0 3px;
  outline:none;
  /* prevent iOS zoom on focus (font >= 16px) */
  font-size:16px;
  transform-origin:center;
  transition:border-color .15s;
  -webkit-appearance:none;appearance:none;
}
.si:focus{border-color:var(--steel);background:rgba(89,112,129,.1)}
.si.done-i{border-color:rgba(89,112,129,.3);color:var(--light)}
.rpe-i{
  background:rgba(255,255,255,.04);
  border:1px solid rgba(89,112,129,.15);
  border-radius:8px;
  color:var(--muted2);
  font-family:'DM Sans';font-size:16px;font-weight:600;
  text-align:center;
  padding:7px 2px;
  width:calc(100% - 6px);
  margin:0 3px;
  outline:none;
  -webkit-appearance:none;appearance:none;
  transition:border-color .15s,color .15s;
}
.rpe-i:focus{border-color:var(--steel)}

/* ── BIG CHECK BUTTON ── */
.chk{
  width:36px;height:36px;
  border-radius:10px;
  border:1.5px solid rgba(89,112,129,.25);
  background:transparent;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;color:transparent;
  transition:all .15s;
  flex-shrink:0;justify-self:center;
  -webkit-user-select:none;user-select:none;
}
.chk.on{background:var(--steel);border-color:var(--steel);color:#000;font-weight:900;box-shadow:0 0 10px rgba(89,112,129,.35)}
.chk:active{transform:scale(.82)}

/* ── TIMER BUTTON ── */
.t-btn{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px;
  background:rgba(89,112,129,.05);
  border:1px solid var(--b1);border-radius:11px;
  cursor:pointer;
  min-height:44px;
  -webkit-user-select:none;user-select:none;
  transition:background .15s;
}
.t-btn:active{background:rgba(89,112,129,.15)}
.t-btn-l{display:flex;align-items:center;gap:8px;font-size:.76rem;color:var(--steel2);font-weight:600}
.t-ico{width:24px;height:24px;border-radius:6px;background:rgba(89,112,129,.18);display:flex;align-items:center;justify-content:center;font-size:.8rem}
.t-dur{font-size:.68rem;color:var(--muted);font-style:italic}

/* ── CARDIO CARD ── */
.cardio-row{display:flex;align-items:center;gap:12px;padding:10px 0;min-height:48px}
.cardio-lbl{font-size:.78rem;color:var(--muted2);flex:1}

/* ── TIMER OVERLAY ── */
.t-ov{
  position:fixed;inset:0;z-index:200;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;
  opacity:0;pointer-events:none;transition:opacity .22s;
  padding:20px;
  padding-top:calc(20px + var(--safe-top));
  padding-bottom:calc(20px + var(--safe-bot));
}
.t-ov.open{opacity:1;pointer-events:all}
.t-ov-bg{position:absolute;inset:0;background:rgba(0,0,0,.97);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px)}
.t-glow{position:absolute;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(89,112,129,.18),transparent 70%);animation:tpls 2.5s ease-in-out infinite}
@keyframes tpls{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.15);opacity:1}}
.t-inner{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:16px;width:100%}
.t-exo-nm{font-size:.65rem;color:var(--muted2);letter-spacing:3px;text-align:center;text-transform:uppercase}
.t-ring{position:relative;width:180px;height:180px}
.t-svg{width:180px;height:180px;transform:rotate(-90deg)}
.t-track{fill:none;stroke:rgba(255,255,255,.05);stroke-width:7}
.t-prog{fill:none;stroke:#597081;stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset .95s linear,stroke .4s}
.t-cnt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.t-time{font-family:'Bebas Neue';font-size:3rem;letter-spacing:5px;line-height:1;color:var(--light)}
.t-sub{font-size:.56rem;color:var(--muted);letter-spacing:3px}
.t-adjs{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.t-adj{
  padding:10px 14px;min-height:44px;
  background:rgba(89,112,129,.1);border:1px solid var(--b1);border-radius:10px;
  color:var(--steel2);font-size:.74rem;font-weight:700;cursor:pointer;
  font-family:'DM Sans';-webkit-user-select:none;user-select:none;
  display:flex;align-items:center;
  transition:background .1s;
}
.t-adj:active{background:rgba(89,112,129,.25)}
.t-ctrls{display:flex;gap:14px;align-items:center}
.t-ctrl{
  width:54px;height:54px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  -webkit-user-select:none;user-select:none;
  transition:transform .1s;
}
.t-ctrl:active{transform:scale(.86)}
.t-ctrl-g{background:rgba(255,255,255,.06);border:1px solid var(--b1);color:var(--muted2)}
.t-ctrl-m{background:var(--steel);color:#000;box-shadow:0 0 18px rgba(89,112,129,.4);width:62px;height:62px;font-size:1.2rem}

/* ── BANKAI ── */
.bk-ov{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;opacity:0;pointer-events:none;transition:opacity .2s;overflow:hidden}
.bk-ov.open{opacity:1;pointer-events:all}
.bk-bg{position:absolute;inset:0;background:#000}
.bk-radial{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(89,112,129,.3),transparent 65%);animation:bkr .7s ease-out forwards;opacity:0}
@keyframes bkr{0%{opacity:0;transform:scale(.4)}100%{opacity:1;transform:scale(1)}}
.bk-lines{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.bk-line{position:absolute;width:1px;background:linear-gradient(to top,transparent,rgba(210,210,210,.3),transparent);height:100vh;animation:bkl .7s ease-out forwards;opacity:0}
@keyframes bkl{0%{opacity:0}60%{opacity:1}100%{opacity:.2}}
.bk-c{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.bk-icon{font-size:3.8rem;animation:bki .45s cubic-bezier(.34,1.56,.64,1) forwards;opacity:0}
@keyframes bki{0%{opacity:0;transform:scale(0) rotate(-90deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
.bk-title{font-family:'Bebas Neue';font-size:4.2rem;letter-spacing:14px;line-height:1;color:var(--light);animation:bkt .5s .2s cubic-bezier(.34,1.56,.64,1) both}
@keyframes bkt{0%{opacity:0;transform:scale(1.8)}100%{opacity:1;transform:scale(1)}}
.bk-sub{font-size:.72rem;color:var(--steel2);letter-spacing:5px;animation:bkt .4s .35s both}
.bk-tap{font-size:.6rem;color:var(--muted);letter-spacing:3px;margin-top:44px;animation:blnk 1.4s infinite}
@keyframes blnk{0%,100%{opacity:1}50%{opacity:.2}}

/* ── BOTTOM SHEET ── */
.s-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.75);
  z-index:150;display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .22s;
  backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
}
.s-ov.open{opacity:1;pointer-events:all}
.sheet{
  background:#0a0a0a;border:1px solid var(--b2);border-bottom:none;
  border-radius:22px 22px 0 0;
  padding:0;width:100%;max-width:680px;
  max-height:88vh;
  display:flex;flex-direction:column;
  transform:translateY(30px);transition:transform .26s cubic-bezier(.4,0,.2,1);
}
.s-ov.open .sheet{transform:translateY(0)}
.sh-handle{width:34px;height:4px;border-radius:99px;background:rgba(255,255,255,.1);margin:12px auto 0;flex-shrink:0}
.sh-head{
  padding:12px 16px 6px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;border-bottom:1px solid var(--b1);
}
.sh-title{font-family:'Bebas Neue';font-size:1.6rem;letter-spacing:3px;color:var(--light)}
.sh-close{
  width:32px;height:32px;min-width:32px;border-radius:50%;
  background:rgba(255,255,255,.05);border:none;color:var(--muted2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:.85rem;
}
.sh-close:active{background:rgba(255,255,255,.12)}
.sh-scroll{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:12px 16px calc(var(--safe-bot) + 24px);
}
.sh-sub{font-size:.7rem;color:var(--muted);margin-bottom:14px}

/* NEXT WEEK */
.day-grp{margin-bottom:16px}
.day-grp-title{font-family:'Bebas Neue';font-size:.88rem;letter-spacing:2px;color:var(--steel2);margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:6px}
.day-dot{width:5px;height:5px;border-radius:50%;background:var(--steel);flex-shrink:0}
.ch-item{display:flex;align-items:center;gap:6px;padding:7px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:.78rem;min-height:40px}
.ch-item:last-child{border:none}
.ch-name{flex:1;color:rgba(255,255,255,.75);font-size:.76rem}
.ch-w{color:var(--muted);font-size:.68rem;white-space:nowrap}
.st-bdg{padding:3px 9px;border-radius:99px;font-weight:700;font-size:.68rem;white-space:nowrap}
.ch-rsn{font-size:.6rem;color:var(--muted);flex-shrink:0}
.confirm-btn{
  width:100%;padding:16px;border:none;border-radius:14px;
  background:var(--steel);color:#000;
  font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:4px;
  cursor:pointer;margin-top:14px;
  min-height:52px;
  -webkit-user-select:none;user-select:none;
  transition:background .15s;
}
.confirm-btn:active{background:var(--steel2)}

/* HISTORY */
.exo-sel{
  width:100%;background:rgba(255,255,255,.04);border:1px solid var(--b1);
  color:var(--text);border-radius:11px;padding:12px 13px;
  font-family:'DM Sans';font-size:16px;outline:none;
  margin-bottom:14px;appearance:none;-webkit-appearance:none;
  min-height:44px;
}
.chart-card{background:rgba(255,255,255,.02);border:1px solid var(--b1);border-radius:14px;padding:14px;margin-bottom:14px}
.chart-ttl{font-family:'Bebas Neue';font-size:.92rem;letter-spacing:2px;color:var(--steel2);margin-bottom:12px}
.mini-chart{height:86px;display:flex;align-items:flex-end;gap:5px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:3px}
.bar-r{width:100%;border-radius:4px 4px 0 0;min-height:4px;background:linear-gradient(to top,rgba(89,112,129,.3),rgba(89,112,129,.6));border:1px solid rgba(89,112,129,.3)}
.bar-l{font-size:.52rem;color:var(--muted)}
.bar-v{font-size:.6rem;font-weight:600;color:var(--steel2)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.chip{background:rgba(255,255,255,.03);border:1px solid var(--b1);border-radius:99px;padding:5px 11px;font-size:.7rem;color:var(--muted2)}
.chip-l{color:var(--muted);margin-right:3px;font-size:.62rem}

/* RECAP */
.recap-card{background:rgba(255,255,255,.02);border:1px solid var(--b1);border-radius:14px;padding:14px;margin-bottom:11px}
.recap-ttl{font-family:'Bebas Neue';font-size:.82rem;letter-spacing:2px;color:var(--muted2);margin-bottom:12px}
.vol-item{margin-bottom:9px}
.vol-top{display:flex;justify-content:space-between;font-size:.71rem;margin-bottom:3px;color:rgba(255,255,255,.65)}
.vol-val{color:var(--muted);font-size:.66rem}
.vol-track{height:3px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden}
.vol-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--steel),var(--light))}
.rule-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:9px;min-height:32px}
.rule-sym{font-family:'Bebas Neue';font-size:1.25rem;width:20px;line-height:1;flex-shrink:0}
.rule-desc{font-size:.74rem;color:rgba(255,255,255,.55);padding-top:2px}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div class="logo">
      <div class="logo-icon">⚔️</div>
      <div class="logo-text">BANKAI</div>
    </div>
    <div class="week-pill">
      <div class="week-num" id="weekNum">S1</div>
      <div class="week-date" id="weekDate">—</div>
    </div>
    <div class="hdr-btns">
      <button class="hbtn" onclick="openRecap()">📊</button>
      <button class="hbtn" onclick="openHistory()">📈</button>
      <button class="hbtn" id="resetBtn" onclick="resetDay()">↺</button>
      <button class="hbtn hbtn-accent" onclick="openNext()">SEM+</button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<!-- PROGRESS -->
<div class="pg-strip">
  <div class="pg-row">
    <div class="pg-left">
      <span class="pg-n" id="pgDone">0</span>
      <span class="pg-t" id="pgTotal">/ 0 séries</span>
    </div>
    <span class="pg-pct" id="pgPct">0%</span>
  </div>
  <div class="pg-track"><div class="pg-fill" id="pgFill" style="width:0%"></div></div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const POLY=["Leg Press","Fentes","Tractions","Rowing","RDL","Hip Thrust","Développé couché","Dips"];
const REST_T={Force:180,Hypertrophie:90,Métabolique:60,"Avant-bras":60,Cardio:0};
const ZONES={
  Force:      {color:"#7a95a8",bg:"rgba(89,112,129,.12)",border:"rgba(89,112,129,.28)"},
  Hypertrophie:{color:"#D2D2D2",bg:"rgba(210,210,210,.07)",border:"rgba(210,210,210,.18)"},
  Métabolique:{color:"#9db3c0",bg:"rgba(89,112,129,.1)",border:"rgba(89,112,129,.22)"},
  "Avant-bras":{color:"#597081",bg:"rgba(89,112,129,.09)",border:"rgba(89,112,129,.2)"},
  Cardio:     {color:"#aaa",bg:"rgba(210,210,210,.05)",border:"rgba(210,210,210,.12)"},
};
const DAYS=[
  {id:"lundi",label:"LUNDI",sub:"Upper A · Push",exos:[
    {id:"dci",name:"Développé couché incliné",muscle:"Pectoraux sup.",w:17.5,unit:"kg/côté",sets:4,reps:"6-8",zone:"Force"},
    {id:"dcp",name:"Développé couché plat",muscle:"Pectoraux",w:15,unit:"kg/côté",sets:3,reps:"10-12",zone:"Hypertrophie"},
    {id:"pd",name:"Pec Deck machine",muscle:"Pectoraux (fin.)",w:30,unit:"kg",sets:3,reps:"15-20",zone:"Métabolique"},
    {id:"dem",name:"Développé épaules machine",muscle:"Deltoïdes ant.",w:22,unit:"kg",sets:3,reps:"10-12",zone:"Hypertrophie"},
    {id:"elc",name:"Élévations latérales câble",muscle:"Deltoïdes lat.",w:5,unit:"kg/côté",sets:4,reps:"15-20",zone:"Métabolique"},
    {id:"etc",name:"Extension triceps corde",muscle:"Triceps",w:17.5,unit:"kg",sets:3,reps:"10-12",zone:"Hypertrophie"},
    {id:"sk",name:"Skull crusher haltères",muscle:"Triceps long",w:8,unit:"kg/côté",sets:3,reps:"10-12",zone:"Hypertrophie"},
    {id:"hiit_l",name:"HIIT vélo elliptique",muscle:"Cardio",w:8,unit:"intervalles",sets:1,reps:"8×30s",zone:"Cardio",isCardio:true},
  ]},
  {id:"mardi",label:"MARDI",sub:"Lower A · Quad",exos:[
    {id:"lp",name:"Leg Press",muscle:"Quadriceps",w:120,unit:"kg",sets:4,reps:"6-8",zone:"Force"},
    {id:"fb",name:"Fentes bulgares",muscle:"Quad / Fessiers",w:10,unit:"kg/main",sets:3,reps:"10/jambe",zone:"Hypertrophie"},
    {id:"le",name:"Leg Extension",muscle:"Quad (iso)",w:40,unit:"kg",sets:3,reps:"15-20",zone:"Métabolique"},
    {id:"lcc",name:"Leg Curl couché",muscle:"Ischio-jambiers",w:42,unit:"kg",sets:4,reps:"10-12",zone:"Hypertrophie"},
    {id:"cm",name:"Crunch machine",muscle:"Abdominaux",w:10,unit:"kg",sets:3,reps:"12-15",zone:"Hypertrophie"},
    {id:"pp",name:"Pallof Press câble",muscle:"Core / Obliques",w:8,unit:"kg",sets:3,reps:"12/côté",zone:"Hypertrophie"},
    {id:"liss_m",name:"LISS Rameur",muscle:"Cardio",w:0,unit:"20min",sets:1,reps:"65% FC max",zone:"Cardio",isCardio:true},
  ]},
  {id:"jeudi",label:"JEUDI",sub:"Upper B · Pull",exos:[
    {id:"tr",name:"Tractions lestées",muscle:"Dos / Biceps",w:5,unit:"kg lest",sets:4,reps:"6-8",zone:"Force"},
    {id:"tp",name:"Tirage poitrine câble",muscle:"Dos (largeur)",w:50,unit:"kg",sets:3,reps:"10-12",zone:"Hypertrophie"},
    {id:"rhs",name:"Rowing Hammer Strength",muscle:"Dos (épaisseur)",w:30,unit:"kg/côté",sets:4,reps:"8-10",zone:"Hypertrophie"},
    {id:"fp",name:"Face Pull câble corde",muscle:"Deltoïdes post.",w:12,unit:"kg",sets:4,reps:"15-20",zone:"Métabolique"},
    {id:"sh",name:"Shrug haltères",muscle:"Trapèzes",w:14,unit:"kg/main",sets:3,reps:"12-15",zone:"Métabolique"},
    {id:"cb",name:"Curl biceps supination",muscle:"Biceps",w:10,unit:"kg/côté",sets:3,reps:"10-12",zone:"Hypertrophie"},
    {id:"cm2",name:"Curl marteau",muscle:"Brachial / Biceps",w:12,unit:"kg/côté",sets:3,reps:"10-12",zone:"Hypertrophie"},
    {id:"wc",name:"Wrist curl",muscle:"Avant-bras",w:7,unit:"kg",sets:2,reps:"12-15",zone:"Avant-bras"},
    {id:"rvc",name:"Reverse curl",muscle:"Avant-bras ext.",w:8,unit:"kg",sets:2,reps:"12-15",zone:"Avant-bras"},
  ]},
  {id:"vendredi",label:"VENDREDI",sub:"Lower B · Ischio/Fessier",exos:[
    {id:"ht",name:"Hip Thrust machine",muscle:"Fessiers",w:70,unit:"kg",sets:4,reps:"10-12",zone:"Hypertrophie"},
    {id:"rdl",name:"RDL haltères",muscle:"Ischio / Fessiers",w:15,unit:"kg/main",sets:4,reps:"8-10",zone:"Hypertrophie"},
    {id:"lca",name:"Leg Curl assis",muscle:"Ischio-jambiers",w:35,unit:"kg",sets:3,reps:"15-20",zone:"Métabolique"},
    {id:"fmv",name:"Fentes marchées",muscle:"Quad / Fessiers",w:10,unit:"kg/main",sets:3,reps:"10/jambe",zone:"Hypertrophie"},
    {id:"mol",name:"Mollets machine",muscle:"Mollets",w:50,unit:"kg",sets:4,reps:"15-20",zone:"Métabolique"},
    {id:"rj",name:"Relevés de jambes",muscle:"Abdominaux bas",w:0,unit:"pds corps",sets:3,reps:"12-15",zone:"Hypertrophie"},
    {id:"fc",name:"Farmer's carry",muscle:"Avant-bras / Core",w:18,unit:"kg/main",sets:3,reps:"25m",zone:"Avant-bras"},
    {id:"hiit_v",name:"HIIT Skillmill",muscle:"Cardio",w:6,unit:"intervalles",sets:1,reps:"6×40s",zone:"Cardio",isCardio:true},
  ]},
];
const MUSCLES=["Pectoraux","Dos","Épaules","Triceps","Biceps","Avant-bras","Quadriceps","Ischio-jambiers","Fessiers","Abdominaux","Mollets","Core"];
function mgOf(m){
  if(m.includes("Pect"))return"Pectoraux";if(m.includes("Dos"))return"Dos";
  if(m.includes("Delt")||m.includes("paul"))return"Épaules";if(m.includes("Tric"))return"Triceps";
  if(m.includes("Bic")||m.includes("Brach"))return"Biceps";if(m.includes("Avant"))return"Avant-bras";
  if(m.includes("Quad"))return"Quadriceps";if(m.includes("Ischio"))return"Ischio-jambiers";
  if(m.includes("Fess"))return"Fessiers";if(m.includes("Abdo"))return"Abdominaux";
  if(m.includes("Molet"))return"Mollets";return"Core";
}

// ── STATE ─────────────────────────────────────────────────────────────────
let S={},H=[],aDay=0,pending=null,selExo=null;

function defSets(ex){
  return Array.from({length:ex.sets},()=>({w:ex.w,reps:ex.reps.split("-")[0]||"8",rpe:0,done:false}));
}
function initS(){
  const now=new Date(),dow=now.getDay(),diff=dow===0?-6:1-dow;
  const mon=new Date(now);mon.setDate(now.getDate()+diff);
  const s={weekNum:1,startDate:mon.toISOString().split("T")[0]};
  DAYS.forEach(d=>{s[d.id]={};d.exos.forEach(e=>{
    s[d.id][e.id]=e.isCardio?{done:false}:{sets:defSets(e)};
  });});
  return s;
}
function load(){
  try{const r=localStorage.getItem("bk6");S=r?JSON.parse(r):initS();}catch{S=initS();}
  try{const r=localStorage.getItem("bk6h");H=r?JSON.parse(r):[];}catch{H=[];}
  DAYS.forEach(d=>d.exos.forEach(e=>{
    const es=S[d.id]?.[e.id];
    if(!e.isCardio&&es&&!es.sets)S[d.id][e.id]={sets:defSets(e)};
  }));
}
function save(){
  localStorage.setItem("bk6",JSON.stringify(S));
  localStorage.setItem("bk6h",JSON.stringify(H));
}
function fd(iso){return new Date(iso).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"});}
function addD(iso,n){const d=new Date(iso);d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}
function isPoly(n){return POLY.some(p=>n.includes(p));}
function rl(z){const s=REST_T[z]||90;return s>=60?`${s/60}min`:`${s}s`;}

function dayPg(id){
  const day=DAYS.find(d=>d.id===id);let done=0,tot=0;
  day.exos.forEach(e=>{
    if(e.isCardio){tot++;if(S[id][e.id]?.done)done++;}
    else{const sets=S[id][e.id]?.sets||[];tot+=sets.length;done+=sets.filter(s=>s.done).length;}
  });
  return{done,tot,pct:tot?Math.round(done/tot*100):0};
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderAll(){
  const day=DAYS[aDay];
  // Header
  document.getElementById("weekNum").textContent=`S${S.weekNum}`;
  document.getElementById("weekDate").textContent=`${fd(S.startDate)} → ${fd(addD(S.startDate,6))}`;
  // Tabs
  document.getElementById("tabs").innerHTML=DAYS.map((d,i)=>
    `<button class="tab ${i===aDay?"active":""}" onclick="switchDay(${i})">${d.label}</button>`
  ).join("");
  // Progress
  const pg=dayPg(day.id);
  document.getElementById("pgDone").textContent=pg.done;
  document.getElementById("pgTotal").textContent=`/ ${pg.tot} séries`;
  document.getElementById("pgPct").textContent=`${pg.pct}%`;
  document.getElementById("pgFill").style.width=`${pg.pct}%`;
  document.getElementById("pgDay").textContent=`${day.label} — ${day.sub}`;
  // Grid
  document.getElementById("grid").innerHTML=day.exos.map(e=>renderCard(e,day)).join("");
}

function rpeColor(v){
  if(!v)return"rgba(89,112,129,.25)";
  if(v>=9)return"#D2D2D2";if(v>=7)return"#9db3c0";return"#597081";
}

function renderCard(ex,day){
  const z=ZONES[ex.zone];
  if(ex.isCardio){
    const done=S[day.id][ex.id]?.done;
    return`<div class="card" style="border-color:${z.border}">
      <div class="card-line"></div>
      <div class="card-body">
        <div class="card-head">
          <div><div class="card-name">${ex.name}</div><div class="card-muscle">${ex.muscle}</div></div>
          <span class="zone-badge" style="background:${z.bg};color:${z.color};border-color:${z.border}">${ex.zone}</span>
        </div>
        <div class="cardio-row">
          <div class="chk ${done?"on":""}" onclick="togCardio('${day.id}','${ex.id}')">✓</div>
          <span class="cardio-lbl">${ex.reps} · ${ex.w} ${ex.unit}</span>
        </div>
      </div>
    </div>`;
  }
  const sets=S[day.id][ex.id]?.sets||defSets(ex);
  return`<div class="card" style="border-color:${z.border}">
    <div class="card-line"></div>
    <div class="card-body">
      <div class="card-head">
        <div><div class="card-name">${ex.name}</div><div class="card-muscle">${ex.muscle}</div></div>
        <span class="zone-badge" style="background:${z.bg};color:${z.color};border-color:${z.border}">${ex.zone}</span>
      </div>
      <div class="sets-table">
        <div class="sets-hdr">
          <span>#</span><span>${ex.unit}</span><span>REPS</span><span>RPE</span><span></span>
        </div>
        ${sets.map((s,i)=>`
        <div class="set-row ${s.done?"done":""}">
          <span class="set-n">${i+1}</span>
          <input class="si ${s.done?"done-i":""}" type="number" inputmode="decimal" step="0.5" min="0" value="${s.w}"
            onchange="setVal('${day.id}','${ex.id}',${i},'w',this.value)">
          <input class="si ${s.done?"done-i":""}" type="number" inputmode="numeric" min="0" max="50" value="${s.reps}"
            onchange="setVal('${day.id}','${ex.id}',${i},'reps',this.value)">
          <input class="rpe-i" type="number" inputmode="numeric" min="0" max="10" value="${s.rpe||""}" placeholder="—"
            onchange="setVal('${day.id}','${ex.id}',${i},'rpe',this.value)"
            style="border-color:${rpeColor(s.rpe)};color:${s.rpe?rpeColor(s.rpe):"var(--muted2)"}">
          <div class="chk ${s.done?"on":""}" onclick="togSet('${day.id}','${ex.id}',${i})">✓</div>
        </div>`).join("")}
      </div>
      <div class="t-btn" onclick="startTimer(${JSON.stringify({id:ex.id,name:ex.name,zone:ex.zone}).replace(/"/g,'&quot;')})">
        <div class="t-btn-l"><div class="t-ico">⏱</div><span>Récupération</span></div>
        <span class="t-dur">${rl(ex.zone)}</span>
      </div>
    </div>
  </div>`;
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────
function switchDay(i){
  aDay=i;
  // scroll to top
  document.querySelector(".scroll-area").scrollTop=0;
  renderAll();
}
function togSet(dId,eId,idx){
  S[dId][eId].sets[idx].done=!S[dId][eId].sets[idx].done;
  save();renderAll();
}
function togCardio(dId,eId){
  S[dId][eId].done=!S[dId][eId].done;
  save();renderAll();
}
function setVal(dId,eId,idx,key,val){
  const v=key==="rpe"?Math.min(10,Math.max(0,parseFloat(val)||0)):(parseFloat(val)||0);
  S[dId][eId].sets[idx][key]=v;
  save();
  if(key==="rpe")renderAll();
}
function resetDay(){
  const dId=DAYS[aDay].id;
  DAYS[aDay].exos.forEach(e=>{
    if(e.isCardio)S[dId][e.id].done=false;
    else S[dId][e.id].sets=defSets(e);
  });
  save();renderAll();
}

// ── TIMER ─────────────────────────────────────────────────────────────────
let tIv=null,tTotal=0,tLeft=0,tPaused=false;
const CIRC=2*Math.PI*78;
function startTimer(exo){
  const sec=REST_T[exo.zone]||90;if(!sec){showBankai();return;}
  tTotal=sec;tLeft=sec;tPaused=false;
  document.getElementById("tName").textContent=exo.name.toUpperCase();
  document.getElementById("tPause").textContent="⏸";
  document.getElementById("tOv").classList.add("open");
  updT();clearInterval(tIv);tIv=setInterval(tick,1000);
}
function tick(){
  if(tPaused)return;
  tLeft--;
  if(tLeft<=0){tLeft=0;updT();clearInterval(tIv);closeTimer();showBankai();return;}
  updT();
}
function updT(){
  const m=Math.floor(tLeft/60),s=tLeft%60;
  document.getElementById("tTime").textContent=`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  const ratio=tTotal>0?tLeft/tTotal:0,off=CIRC*(1-ratio);
  const p=document.getElementById("tProg");
  p.style.strokeDashoffset=off;
  const pct=1-ratio;
  p.style.stroke=pct<.5?"#597081":pct<.8?"#9db3c0":"#D2D2D2";
}
function togglePause(){tPaused=!tPaused;document.getElementById("tPause").textContent=tPaused?"▶":"⏸";}
function skipTimer(){clearInterval(tIv);closeTimer();showBankai();}
function closeTimer(){document.getElementById("tOv").classList.remove("open");clearInterval(tIv);}
function adj(s){tLeft=Math.max(5,tLeft+s);if(s>0)tTotal=Math.max(tTotal,tLeft);updT();}

// ── BANKAI ────────────────────────────────────────────────────────────────
function showBankai(){
  if(navigator.vibrate)navigator.vibrate([80,40,80,40,250]);
  document.getElementById("bkOv").classList.add("open");
  setTimeout(closeBankai,4500);
}
function closeBankai(){document.getElementById("bkOv").classList.remove("open");}

// ── NEXT WEEK ─────────────────────────────────────────────────────────────
function calcChanges(){
  const r={};
  DAYS.forEach(d=>{r[d.id]=d.exos.map(e=>{
    if(e.isCardio)return{id:e.id,name:e.name,oldW:"—",newW:"—",delta:0,status:"→",reason:"Cardio"};
    const sets=S[d.id][e.id]?.sets||[];
    const doneSets=sets.filter(s=>s.done);
    const all=doneSets.length>=e.sets,half=doneSets.length>=Math.ceil(e.sets/2);
    let delta=all?(isPoly(e.name)?5:2.5):half?0:-2.5;
    const avgW=doneSets.length?doneSets.reduce((a,b)=>a+b.w,0)/doneSets.length:e.w;
    const newW=Math.max(0,avgW+delta);
    return{id:e.id,name:e.name,oldW:avgW.toFixed(1),newW:newW.toFixed(1),delta,
      status:delta>0?"↑":delta<0?"↓":"→",
      reason:all?"Toutes ✓":half?"Min. ok":"Min. ✗"};
  });});
  return r;
}
function openNext(){
  pending=calcChanges();
  document.getElementById("nextSub").textContent=`Changements → Semaine ${S.weekNum+1}`;
  document.getElementById("nextContent").innerHTML=DAYS.map(d=>`
    <div class="day-grp">
      <div class="day-grp-title"><div class="day-dot"></div>${d.label} · ${d.sub}</div>
      ${pending[d.id].map(c=>`
        <div class="ch-item">
          <span class="ch-name">${c.name}</span>
          <span class="ch-w">${c.oldW}→${c.newW}${c.reason!=="Cardio"?" kg":""}</span>
          <span class="st-bdg" style="background:${c.status==="↑"?"rgba(210,210,210,.1)":c.status==="↓"?"rgba(89,112,129,.12)":"rgba(89,112,129,.08)"};color:${c.status==="↑"?"#D2D2D2":c.status==="↓"?"#597081":"#9db3c0"}">${c.status}</span>
          <span class="ch-rsn">${c.reason}</span>
        </div>`).join("")}
    </div>`).join("");
  openSheet("nextOv");
}
function confirmNext(){
  const snap=JSON.parse(JSON.stringify(S));snap._label=`S${S.weekNum}`;
  H=[...H.slice(-11),snap];
  DAYS.forEach(d=>pending[d.id].forEach(c=>{
    if(!S[d.id][c.id]?.sets)return;
    const nw=parseFloat(c.newW)||0;
    S[d.id][c.id].sets=S[d.id][c.id].sets.map(s=>({...s,w:nw,done:false,rpe:0}));
  }));
  S.weekNum++;S.startDate=addD(S.startDate,7);
  save();closeSheet("nextOv");renderAll();
}

// ── HISTORY ───────────────────────────────────────────────────────────────
function openHistory(){
  const all=DAYS.flatMap(d=>d.exos.filter(e=>!e.isCardio));
  if(!selExo)selExo=all[0].id;
  renderHist();openSheet("histOv");
}
function renderHist(){
  const all=DAYS.flatMap(d=>d.exos.filter(e=>!e.isCardio));
  const ex=all.find(e=>e.id===selExo)||all[0];
  const data=H.map((sn,i)=>{
    let w=null;
    DAYS.forEach(d=>{const es=sn[d.id]?.[selExo];if(es?.sets){const ws=es.sets.map(s=>s.w);w=ws.reduce((a,b)=>a+b,0)/ws.length;}});
    return{l:sn._label||`S${i+1}`,w};
  }).filter(d=>d.w!=null).slice(-6);
  const mx=data.length?Math.max(...data.map(d=>d.w),1):1;
  document.getElementById("histContent").innerHTML=`
    <select class="exo-sel" onchange="selExo=this.value;renderHist()">
      ${DAYS.map(d=>`<optgroup label="${d.label} – ${d.sub}">${d.exos.filter(e=>!e.isCardio).map(e=>`<option value="${e.id}" ${e.id===selExo?"selected":""}>${e.name}</option>`).join("")}</optgroup>`).join("")}
    </select>
    <div class="chart-card">
      <div class="chart-ttl">${ex.name}</div>
      ${data.length<2?`<div style="color:var(--muted);font-size:.78rem;text-align:center;padding:20px">Complète 2+ semaines.</div>`:`
      <div class="mini-chart">${data.map(d=>`
        <div class="bar-col">
          <div class="bar-v">${Math.round(d.w*10)/10}</div>
          <div class="bar-r" style="height:${Math.max(6,d.w/mx*70)}px"></div>
          <div class="bar-l">${d.l}</div>
        </div>`).join("")}
      </div>`}
    </div>
    ${H.length?`<div class="chips">${H.slice(-6).map((sn,i)=>{
      let w=null;DAYS.forEach(d=>{const es=sn[d.id]?.[selExo];if(es?.sets){const ws=es.sets.map(s=>s.w);w=ws.reduce((a,b)=>a+b,0)/ws.length;}});
      return`<div class="chip"><span class="chip-l">${sn._label||"S"+(i+1)}</span>${w!=null?Math.round(w*10)/10+" "+ex.unit:"—"}</div>`;
    }).join("")}</div>`:""}`;
}

// ── RECAP ─────────────────────────────────────────────────────────────────
function openRecap(){
  const vol={};MUSCLES.forEach(m=>{vol[m]=0;});
  DAYS.forEach(d=>d.exos.forEach(e=>{if(e.isCardio)return;const g=mgOf(e.muscle);vol[g]=(vol[g]||0)+e.sets;}));
  const mx=Math.max(...Object.values(vol),1);
  document.getElementById("recapSub").textContent=`S${S.weekNum} · ${fd(S.startDate)} → ${fd(addD(S.startDate,6))}`;
  document.getElementById("recapContent").innerHTML=`
    <div class="recap-card">
      <div class="recap-ttl">VOLUME PAR GROUPE MUSCULAIRE</div>
      ${MUSCLES.filter(m=>vol[m]>0).map(m=>`
        <div class="vol-item">
          <div class="vol-top"><span>${m}</span><span class="vol-val">${vol[m]} séries</span></div>
          <div class="vol-track"><div class="vol-fill" style="width:${vol[m]/mx*100}%"></div></div>
        </div>`).join("")}
    </div>
    <div class="recap-card">
      <div class="recap-ttl">SURCHARGE PROGRESSIVE</div>
      ${[{sym:"↑",col:"#D2D2D2",t:"Poly +5kg / Isolation +2.5kg — toutes séries ✓"},{sym:"→",col:"#9db3c0",t:"Même charge — reps min. atteintes"},{sym:"↓",col:"#597081",t:"−2.5kg — reps min. non atteintes"}].map(r=>`
        <div class="rule-item"><span class="rule-sym" style="color:${r.col}">${r.sym}</span><span class="rule-desc">${r.t}</span></div>`).join("")}
    </div>`;
  openSheet("recapOv");
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function openSheet(id){document.getElementById(id).classList.add("open");}
function closeSheet(id){document.getElementById(id).classList.remove("open");}
document.querySelectorAll(".s-ov").forEach(el=>
  el.addEventListener("click",e=>{if(e.target===el)el.classList.remove("open");})
);

load();renderAll();
</script>

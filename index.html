<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="BANKAI">
<title>BANKAI</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000;--s1:#0a0a0a;--s2:#111;--s3:#1a1a1a;
  --b1:rgba(89,112,129,.25);--b2:rgba(89,112,129,.45);--b3:rgba(210,210,210,.15);
  --steel:#597081;--steel2:#7a95a8;--steel3:#9db3c0;
  --light:#D2D2D2;--light2:#e8e8e8;--text:#f0f0f0;
  --muted:#597081;--muted2:#8a9fa8;--r:14px;
  --ok:#7a95a8;--warn:#9db3c0;--fail:#597081;
}
html{height:100%}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100%;overflow-x:hidden;padding-bottom:calc(env(safe-area-inset-bottom)+24px);-webkit-font-smoothing:antialiased}

.bg-wrap{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(90px);opacity:.07}
.bg-orb1{width:500px;height:500px;background:radial-gradient(circle,#597081,transparent);top:-150px;left:-100px;animation:ob1 22s ease-in-out infinite}
.bg-orb2{width:350px;height:350px;background:radial-gradient(circle,#D2D2D2,transparent);bottom:-80px;right:-80px;animation:ob2 28s ease-in-out infinite}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(89,112,129,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(89,112,129,.04) 1px,transparent 1px);background-size:36px 36px}
@keyframes ob1{0%,100%{transform:translate(0,0)}50%{transform:translate(50px,40px)}}
@keyframes ob2{0%,100%{transform:translate(0,0)}50%{transform:translate(-40px,-50px)}}

/* HEADER */
.hdr{position:sticky;top:0;z-index:50;padding:calc(env(safe-area-inset-top)+10px) 0 0}
.hdr-glass{background:rgba(0,0,0,.85);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--b1)}
.hdr-inner{max-width:780px;margin:0 auto;padding:0 14px}
.hdr-top{display:flex;justify-content:space-between;align-items:center;padding:11px 0 10px;gap:8px;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:9px}
.logo-icon{width:34px;height:34px;border-radius:9px;background:var(--steel);display:flex;align-items:center;justify-content:center;font-size:1rem}
.logo-text{font-family:'Bebas Neue';font-size:1.45rem;letter-spacing:5px;color:var(--light)}
.week-pill{background:rgba(89,112,129,.12);border:1px solid var(--b2);border-radius:99px;padding:4px 13px;text-align:center}
.week-num{font-family:'Bebas Neue';font-size:.9rem;letter-spacing:2px;color:var(--steel2);line-height:1}
.week-date{font-size:.58rem;color:var(--muted);letter-spacing:.4px}
.hdr-actions{display:flex;gap:5px}
.act-btn{height:32px;border-radius:9px;border:1px solid var(--b1);background:rgba(255,255,255,.03);color:var(--muted2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.8rem;padding:0 10px;transition:all .15s;font-family:'DM Sans';white-space:nowrap}
.act-btn:active{background:rgba(89,112,129,.2);color:var(--light);transform:scale(.93)}
.act-btn-next{background:var(--steel);color:#000;border-color:transparent;font-weight:700;font-size:.72rem;letter-spacing:.5px}
.act-btn-next:active{background:var(--steel2)}

/* TABS */
.tabs-wrap{display:flex;overflow-x:auto;scrollbar-width:none;padding:2px 0 0}
.tabs-wrap::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:68px;padding:9px 4px 12px;border:none;background:transparent;font-family:'Bebas Neue';font-size:.8rem;letter-spacing:2px;cursor:pointer;border-bottom:2px solid transparent;transition:all .18s;color:var(--muted);white-space:nowrap}
.tab.active{color:var(--light);border-color:var(--steel)}

/* FATIGUE INDICATOR */
.fatigue-bar{background:rgba(0,0,0,.9);border-bottom:1px solid var(--b1);padding:9px 14px}
.fatigue-inner{max-width:780px;margin:0 auto}
.pg-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.pg-done{font-family:'Bebas Neue';font-size:1rem;color:var(--light)}
.pg-total{font-size:.7rem;color:var(--muted)}
.pg-pct{font-family:'Bebas Neue';font-size:.82rem;color:var(--steel2)}
.pg-track{height:2px;background:rgba(255,255,255,.06);border-radius:99px;overflow:hidden}
.pg-fill{height:100%;background:linear-gradient(90deg,var(--steel),var(--light));border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.fatigue-row{display:flex;gap:8px;margin-top:6px;align-items:center}
.fatigue-lbl{font-size:.6rem;color:var(--muted);letter-spacing:.5px;flex:1}
.fatigue-chips{display:flex;gap:5px}
.f-chip{font-size:.58rem;padding:2px 7px;border-radius:99px;border:1px solid;font-weight:600;letter-spacing:.3px}

/* GRID */
.grid{max-width:780px;margin:0 auto;padding:14px 12px 90px;display:grid;grid-template-columns:repeat(auto-fill,minmax(272px,1fr));gap:11px;position:relative;z-index:1}

/* CARD */
.card{background:rgba(10,10,10,.8);border:1px solid var(--b1);border-radius:18px;overflow:hidden;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);position:relative}
.card::before{content:'';position:absolute;inset:0;border-radius:18px;background:linear-gradient(135deg,rgba(255,255,255,.02),transparent 60%);pointer-events:none}
.card-line{height:1px;background:linear-gradient(90deg,var(--steel),rgba(89,112,129,.15),transparent)}
.card-body{padding:13px 13px 11px;display:flex;flex-direction:column;gap:10px}
.card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.card-name{font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:1px;line-height:1.15;color:var(--light2)}
.card-muscle{font-size:.65rem;color:var(--muted2);margin-top:2px;display:flex;align-items:center;gap:3px}
.card-muscle::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--steel);display:inline-block;flex-shrink:0}
.zone-badge{padding:3px 9px;border-radius:99px;font-size:.62rem;font-weight:700;letter-spacing:.7px;white-space:nowrap;flex-shrink:0}

/* PERF SUMMARY on card */
.card-perf{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;background:rgba(89,112,129,.05);border:1px solid var(--b1);border-radius:9px}
.perf-item{display:flex;flex-direction:column;align-items:center;gap:1px}
.perf-val{font-family:'Bebas Neue';font-size:.95rem;line-height:1}
.perf-lbl{font-size:.52rem;color:var(--muted);letter-spacing:.5px}
.perf-sep{width:1px;height:22px;background:var(--b1)}

/* SETS TABLE */
.sets-table{display:flex;flex-direction:column;gap:0;border:1px solid var(--b1);border-radius:11px;overflow:hidden}
.sets-header{display:grid;grid-template-columns:28px 1fr 1fr 1fr 32px;gap:0;background:rgba(89,112,129,.08);padding:5px 8px;border-bottom:1px solid var(--b1)}
.sets-header span{font-size:.58rem;color:var(--muted);letter-spacing:.8px;text-align:center;font-weight:600}
.sets-header span:first-child{text-align:left}
.set-row{display:grid;grid-template-columns:28px 1fr 1fr 1fr 32px;gap:0;padding:7px 8px;align-items:center;border-bottom:1px solid rgba(89,112,129,.08);transition:background .15s;position:relative}
.set-row:last-child{border-bottom:none}
.set-row.done-row{background:rgba(89,112,129,.07)}
.set-num{font-family:'Bebas Neue';font-size:.85rem;color:var(--muted);line-height:1}
.set-input{background:rgba(255,255,255,.04);border:1px solid rgba(89,112,129,.18);border-radius:7px;color:var(--text);font-family:'DM Sans';font-size:.8rem;font-weight:600;text-align:center;padding:4px 3px;width:100%;outline:none;margin:0 2px;min-width:0;transition:border-color .15s}
.set-input:focus{border-color:var(--steel)}
.set-input.done-input{border-color:rgba(89,112,129,.35);color:var(--light)}
.rpe-input-wrap{position:relative;margin:0 2px}
.rpe-input{background:rgba(255,255,255,.04);border:1px solid rgba(89,112,129,.18);border-radius:7px;color:var(--text);font-family:'DM Sans';font-size:.8rem;font-weight:600;text-align:center;padding:4px 3px;width:100%;outline:none;transition:border-color .15s,color .15s}
.rpe-input:focus{border-color:var(--steel)}
.set-check{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(89,112,129,.3);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.65rem;color:transparent;transition:all .18s;flex-shrink:0;-webkit-user-select:none;user-select:none;justify-self:center}
.set-check.checked{background:var(--steel);border-color:var(--steel);color:#000;box-shadow:0 0 10px rgba(89,112,129,.4)}
.set-check:active{transform:scale(.82)}

/* NOTE SEANCE */
.note-area{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--b1);border-radius:9px;color:var(--text);font-family:'DM Sans';font-size:.75rem;padding:8px 10px;outline:none;resize:none;height:58px;transition:border-color .2s}
.note-area:focus{border-color:var(--steel)}
.note-area::placeholder{color:var(--muted)}
.note-save-btn{margin-top:5px;width:100%;padding:7px;border:1px solid var(--b1);border-radius:9px;background:rgba(89,112,129,.08);color:var(--steel2);font-family:'DM Sans';font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s}
.note-save-btn:active{background:rgba(89,112,129,.2)}

/* TIMER BTN */
.timer-btn{display:flex;align-items:center;justify-content:space-between;padding:8px 11px;background:rgba(89,112,129,.06);border:1px solid var(--b1);border-radius:11px;cursor:pointer;transition:all .2s}
.timer-btn:active{background:rgba(89,112,129,.14);transform:scale(.98)}
.timer-btn-l{display:flex;align-items:center;gap:7px;font-size:.74rem;color:var(--steel2);font-weight:600}
.timer-icon{width:22px;height:22px;border-radius:6px;background:rgba(89,112,129,.18);display:flex;align-items:center;justify-content:center;font-size:.75rem}
.timer-dur{font-size:.67rem;color:var(--muted);font-style:italic}

/* TIMER OVERLAY */
.t-ov{position:fixed;inset:0;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;opacity:0;pointer-events:none;transition:opacity .25s;padding:20px}
.t-ov.open{opacity:1;pointer-events:all}
.t-bg{position:absolute;inset:0;background:rgba(0,0,0,.96);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px)}
.t-glow{position:absolute;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(89,112,129,.2),transparent 70%);animation:tpulse 2.5s ease-in-out infinite}
@keyframes tpulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.15);opacity:1}}
.t-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:14px;width:100%}
.t-exo-name{font-size:.68rem;color:var(--muted2);letter-spacing:3px;text-transform:uppercase;text-align:center}
.t-ring{position:relative;width:188px;height:188px}
.t-svg{width:188px;height:188px;transform:rotate(-90deg)}
.t-track{fill:none;stroke:rgba(255,255,255,.05);stroke-width:6}
.t-prog{fill:none;stroke-width:6;stroke-linecap:round;transition:stroke-dashoffset .95s linear,stroke .4s}
.t-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.t-time{font-family:'Bebas Neue';font-size:3.2rem;letter-spacing:5px;line-height:1;color:var(--light)}
.t-sublabel{font-size:.58rem;color:var(--muted);letter-spacing:3px}
.t-adjs{display:flex;gap:7px}
.t-adj{padding:7px 13px;background:rgba(89,112,129,.1);border:1px solid var(--b1);border-radius:9px;color:var(--steel2);font-size:.72rem;font-weight:700;cursor:pointer;transition:all .15s;font-family:'DM Sans'}
.t-adj:active{background:rgba(89,112,129,.25);transform:scale(.93)}
.t-ctrls{display:flex;gap:12px;align-items:center}
.t-ctrl{width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1.1rem;transition:all .2s}
.t-ctrl:active{transform:scale(.88)}
.t-ctrl-ghost{background:rgba(255,255,255,.05);border:1px solid var(--b1);color:var(--muted2)}
.t-ctrl-main{background:var(--steel);color:#000;box-shadow:0 0 20px rgba(89,112,129,.4);width:60px;height:60px;font-size:1.15rem}

/* BANKAI */
.bk-ov{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;opacity:0;pointer-events:none;transition:opacity .2s;overflow:hidden}
.bk-ov.open{opacity:1;pointer-events:all}
.bk-bg{position:absolute;inset:0;background:#000}
.bk-radial{position:absolute;inset:0;background:radial-gradient(ellipse at center,rgba(89,112,129,.35) 0%,transparent 65%);animation:bkr .8s ease-out forwards;opacity:0}
@keyframes bkr{0%{opacity:0;transform:scale(.4)}100%{opacity:1;transform:scale(1)}}
.bk-lines{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.bk-line{position:absolute;width:1px;background:linear-gradient(to top,transparent,rgba(210,210,210,.35),transparent);height:100vh;animation:bkl .7s ease-out forwards;opacity:0}
@keyframes bkl{0%{opacity:0}60%{opacity:1}100%{opacity:.2}}
.bk-content{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:6px}
.bk-icon{font-size:4rem;animation:bki .5s cubic-bezier(.34,1.56,.64,1) forwards;opacity:0;filter:drop-shadow(0 0 20px rgba(210,210,210,.5))}
@keyframes bki{0%{opacity:0;transform:scale(0) rotate(-90deg)}100%{opacity:1;transform:scale(1) rotate(0)}}
.bk-title{font-family:'Bebas Neue';font-size:4.5rem;letter-spacing:14px;line-height:1;color:var(--light);animation:bkt .5s .2s cubic-bezier(.34,1.56,.64,1) both}
@keyframes bkt{0%{opacity:0;transform:scale(1.8)}100%{opacity:1;transform:scale(1)}}
.bk-sub{font-size:.75rem;color:var(--steel2);letter-spacing:5px;animation:bkt .4s .38s both}
.bk-tap{font-size:.62rem;color:var(--muted);letter-spacing:3px;margin-top:44px;animation:blnk 1.4s infinite}
@keyframes blnk{0%,100%{opacity:1}50%{opacity:.2}}

/* SHEETS */
.s-ov{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:150;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.s-ov.open{opacity:1;pointer-events:all}
.sheet{background:rgba(8,8,8,.97);border:1px solid var(--b2);border-bottom:none;border-radius:22px 22px 0 0;padding:6px 0 0;width:100%;max-width:680px;max-height:90vh;overflow-y:auto;transform:translateY(28px);transition:transform .28s cubic-bezier(.4,0,.2,1)}
.s-ov.open .sheet{transform:translateY(0)}
.sh-handle{width:34px;height:4px;border-radius:99px;background:rgba(255,255,255,.1);margin:10px auto 0}
.sh-head{padding:14px 18px 4px;display:flex;align-items:flex-start;justify-content:space-between}
.sh-title{font-family:'Bebas Neue';font-size:1.7rem;letter-spacing:3px;color:var(--light)}
.sh-close{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.05);border:none;color:var(--muted2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.82rem;flex-shrink:0}
.sh-body{padding:10px 18px calc(env(safe-area-inset-bottom)+30px)}
.sh-sub{font-size:.72rem;color:var(--muted);margin-bottom:14px}

/* NEXT WEEK */
.day-grp{margin-bottom:18px}
.day-grp-title{font-family:'Bebas Neue';font-size:.92rem;letter-spacing:2px;color:var(--steel2);margin-bottom:9px;padding-bottom:5px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:7px}
.day-dot{width:5px;height:5px;border-radius:50%;background:var(--steel)}
.ch-item{display:flex;align-items:center;gap:7px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:.78rem}
.ch-item:last-child{border:none}
.ch-name{flex:1;color:rgba(255,255,255,.75)}
.ch-w{color:var(--muted);font-size:.7rem}
.st-badge{padding:2px 9px;border-radius:99px;font-weight:700;font-size:.68rem}
.ch-reason{font-size:.6rem;color:var(--muted);flex-shrink:0}
.confirm-btn{width:100%;padding:15px;border:none;border-radius:14px;background:var(--steel);color:#000;font-family:'Bebas Neue';font-size:1.1rem;letter-spacing:4px;cursor:pointer;margin-top:14px;box-shadow:0 4px 24px rgba(89,112,129,.35);transition:all .2s}
.confirm-btn:active{transform:scale(.97)}

/* HISTORY */
.exo-sel{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--b1);color:var(--text);border-radius:11px;padding:9px 13px;font-family:'DM Sans';font-size:.8rem;outline:none;margin-bottom:14px;appearance:none;-webkit-appearance:none}
.chart-card{background:rgba(255,255,255,.02);border:1px solid var(--b1);border-radius:14px;padding:15px;margin-bottom:14px}
.chart-ttl{font-family:'Bebas Neue';font-size:.95rem;letter-spacing:2px;color:var(--steel2);margin-bottom:12px}
.mini-chart{height:88px;display:flex;align-items:flex-end;gap:5px}
.bar-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:3px}
.bar-r{width:100%;border-radius:4px 4px 0 0;min-height:4px;transition:height .4s;background:linear-gradient(to top,rgba(89,112,129,.3),rgba(89,112,129,.6));border:1px solid rgba(89,112,129,.35)}
.bar-l{font-size:.53rem;color:var(--muted)}
.bar-v{font-size:.6rem;font-weight:600;color:var(--steel2)}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.chip{background:rgba(255,255,255,.03);border:1px solid var(--b1);border-radius:99px;padding:4px 11px;font-size:.7rem;color:var(--muted2)}
.chip-l{color:var(--muted);margin-right:3px;font-size:.63rem}

/* RPE TREND in history */
.rpe-mini{height:44px;display:flex;align-items:flex-end;gap:4px;margin-top:10px}
.rpe-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.rpe-bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height .4s}
.rpe-lbl{font-size:.5rem;color:var(--muted)}

/* RECAP */
.recap-card{background:rgba(255,255,255,.02);border:1px solid var(--b1);border-radius:14px;padding:15px;margin-bottom:11px}
.recap-ttl{font-family:'Bebas Neue';font-size:.83rem;letter-spacing:2px;color:var(--muted2);margin-bottom:12px}
.vol-item{margin-bottom:9px}
.vol-top{display:flex;justify-content:space-between;font-size:.72rem;margin-bottom:3px;color:rgba(255,255,255,.65)}
.vol-val{color:var(--muted);font-size:.67rem}
.vol-track{height:3px;background:rgba(255,255,255,.05);border-radius:99px;overflow:hidden}
.vol-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--steel),var(--light))}
.rule-item{display:flex;gap:11px;align-items:center;margin-bottom:9px}
.rule-sym{font-family:'Bebas Neue';font-size:1.3rem;width:20px;line-height:1}
.rule-desc{font-size:.76rem;color:rgba(255,255,255,.55)}

/* NOTES HISTORY in recap */
.note-hist-item{padding:8px 10px;background:rgba(89,112,129,.05);border:1px solid var(--b1);border-radius:9px;margin-bottom:7px}
.note-hist-date{font-size:.6rem;color:var(--muted);margin-bottom:3px;letter-spacing:.5px}
.note-hist-text{font-size:.74rem;color:rgba(255,255,255,.65)}

/* PERF ALERT in card */
.perf-alert{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:8px;font-size:.66rem;font-weight:600}
</style>
</head>
<body>

<div class="bg-wrap">
  <div class="bg-orb bg-orb1"></div>
  <div class="bg-orb bg-orb2"></div>
  <div class="bg-grid"></div>
</div>

<div id="root"></div>

<!-- TIMER -->
<div class="t-ov" id="tOv">
  <div class="t-bg"></div>
  <div class="t-glow"></div>
  <div class="t-content">
    <div class="t-exo-name" id="tName">—</div>
    <div class="t-ring">
      <svg class="t-svg" viewBox="0 0 188 188">
        <circle class="t-track" cx="94" cy="94" r="80"/>
        <circle class="t-prog" id="tProg" cx="94" cy="94" r="80"
          stroke-dasharray="503" stroke-dashoffset="0" stroke="#597081"/>
      </svg>
      <div class="t-center">
        <div class="t-time" id="tTime">01:30</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const POLY=["Leg Press","Fentes","Tractions","Rowing","RDL","Hip Thrust","Développé couché","Dips"];
const REST_T={Force:180,Hypertrophie:90,Métabolique:60,"Avant-bras":60,Cardio:0};
const ZONES={
  Force:      {color:"#7a95a8",bg:"rgba(89,112,129,.12)",border:"rgba(89,112,129,.3)"},
  Hypertrophie:{color:"#D2D2D2",bg:"rgba(210,210,210,.08)",border:"rgba(210,210,210,.2)"},
  Métabolique:{color:"#9db3c0",bg:"rgba(89,112,129,.1)",border:"rgba(89,112,129,.25)"},
  "Avant-bras":{color:"#597081",bg:"rgba(89,112,129,.1)",border:"rgba(89,112,129,.22)"},
  Cardio:     {color:"#aaaaaa",bg:"rgba(210,210,210,.06)",border:"rgba(210,210,210,.15)"},
};

// ── PROGRAMME OPTIMISÉ ──────────────────────────────────────────────────
// LUNDI: DCI (Force) → Dips (Hyp, remplace DCP → moins de fatigue pectorale cumulative)
//         → Pec Deck → DEM → Élév. lat → Extension triceps → Skull crusher → HIIT
// MARDI: LP (Force) → Fentes bulgares → Leg Extension → Leg Curl couché → Crunch → Pallof → LISS
// JEUDI: Tractions (Force) → Rowing HS (avant Tirage poitrine = dos frais sur lourd)
//         → Tirage poitrine → Face Pull → Shrug → Curl biceps → Curl marteau → Wrist/Reverse
// VENDREDI: RDL (Force, chaîne post fraîche) → Hip Thrust → Leg Curl assis
//           → Fentes marchées → Mollets → Relevés jambes → Farmer's carry → HIIT

const DAYS=[
  {id:"lundi",label:"LUNDI",sub:"Upper A · Push",color:"#7a95a8",exos:[
    {id:"dci",name:"Développé couché incliné",muscle:"Pectoraux sup.",w:17.5,unit:"kg/côté",sets:4,reps:"6-8",zone:"Force",
     note:"Premier exercice, pectoraux frais. RPE cible 7-8."},
    {id:"dips",name:"Dips lestés",muscle:"Pectoraux bas / Triceps",w:5,unit:"kg lest",sets:3,reps:"10-12",zone:"Hypertrophie",
     note:"Remplace DCP. Même stimulation pec/tri mais moins de fatigue arthiculaire post-incliné."},
    {id:"pd",name:"Pec Deck machine",muscle:"Pectoraux (fin.)",w:30,unit:"kg",sets:3,reps:"15-20",zone:"Métabolique",
     note:"Finition isolation. Charge plus facile à tenir malgré fatigue."},
    {id:"dem",name:"Développé épaules machine",muscle:"Deltoïdes ant.",w:22,unit:"kg",sets:3,reps:"10-12",zone:"Hypertrophie"},
    {id:"elc",name:"Élévations latérales câble",muscle:"Deltoïdes lat.",w:5,unit:"kg/côté",sets:4,reps:"15-20",zone:"Métabolique"},
    {id:"etc",name:"Extension triceps corde",muscle:"Triceps",w:17.5,unit:"kg",sets:3,reps:"10-12",zone:"Hypertrophie"},
    {id:"sk",name:"Skull crusher haltères",muscle:"Triceps long",w:8,unit:"kg/côté",sets:3,reps:"10-12",zone:"Hypertrophie"},
    {id:"hiit_l",name:"HIIT vélo elliptique",muscle:"Cardio",w:8,unit:"intervalles",sets:1,reps:"8×30s",zone:"Cardio",isCardio:true},
  ]},
  {id:"mardi",label:"MARDI",sub:"Lower A · Quad",color:"#9db3c0",exos:[
    {id:"lp",name:"Leg Press",muscle:"Quadriceps",w:120,unit:"kg",sets:4,reps:"6-8",zone:"Force",
     note:"Quadriceps frais. Amplitude complète, genoux à 90°."},
    {id:"fb",name:"Fentes bulgares",muscle:"Quad / Fessiers",w:10,unit:"kg/main",sets:3,reps:"10/jambe",zone:"Hypertrophie",
     note:"Avant Leg Extension pour garder stabilité sur mouvement technique."},
    {id:"le",name:"Leg Extension",muscle:"Quad (iso)",w:40,unit:"kg",sets:3,reps:"15-20",zone:"Métabolique"},
    {id:"lcc",name:"Leg Curl couché",muscle:"Ischio-jambiers",w:42,unit:"kg",sets:4,reps:"10-12",zone:"Hypertrophie",
     note:"Ischio encore frais, pas pré-fatigués par la chaîne post."},
    {id:"cm",name:"Crunch machine",muscle:"Abdominaux",w:10,unit:"kg",sets:3,reps:"12-15",zone:"Hypertrophie"},
    {id:"pp",name:"Pallof Press câble",muscle:"Core / Obliques",w:8,unit:"kg",sets:3,reps:"12/côté",zone:"Hypertrophie"},
    {id:"liss_m",name:"LISS Rameur",muscle:"Cardio",w:0,unit:"20min",sets:1,reps:"65% FC max",zone:"Cardio",isCardio:true},
  ]},
  {id:"jeudi",label:"JEUDI",sub:"Upper B · Pull",color:"#D2D2D2",exos:[
    {id:"tr",name:"Tractions lestées",muscle:"Dos / Biceps",w:5,unit:"kg lest",sets:4,reps:"6-8",zone:"Force",
     note:"Dos frais. RPE 7-8. Amplitude complète, dead hang en bas."},
    {id:"rhs",name:"Rowing Hammer Strength",muscle:"Dos (épaisseur)",w:30,unit:"kg/côté",sets:4,reps:"8-10",zone:"Hypertrophie",
     note:"Déplacé avant Tirage poitrine : dos encore frais sur le mouvement lourd."},
    {id:"tp",name:"Tirage poitrine câble",muscle:"Dos (largeur)",w:50,unit:"kg",sets:3,reps:"10-12",zone:"Hypertrophie",
     note:"Maintenant 3e exo : charge légèrement abaissée si nécessaire, toujours efficace."},
    {id:"fp",name:"Face Pull câble corde",muscle:"Deltoïdes post.",w:12,unit:"kg",sets:4,reps:"15-20",zone:"Métabolique"},
    {id:"sh",name:"Shrug haltères",muscle:"Trapèzes",w:14,unit:"kg/main",sets:3,reps:"12-15",zone:"Métabolique"},
    {id:"cb",name:"Curl biceps supination",muscle:"Biceps",w:10,unit:"kg/côté",sets:3,reps:"10-12",zone:"Hypertrophie"},
    {id:"cm2",name:"Curl marteau",muscle:"Brachial / Biceps",w:12,unit:"kg/côté",sets:3,reps:"10-12",zone:"Hypertrophie"},
    {id:"wc",name:"Wrist curl",muscle:"Avant-bras",w:7,unit:"kg",sets:2,reps:"12-15",zone:"Avant-bras"},
    {id:"rvc",name:"Reverse curl",muscle:"Avant-bras ext.",w:8,unit:"kg",sets:2,reps:"12-15",zone:"Avant-bras"},
  ]},
  {id:"vendredi",label:"VENDREDI",sub:"Lower B · Ischio/Fessier",color:"#597081",exos:[
    {id:"rdl",name:"RDL haltères",muscle:"Ischio / Fessiers",w:15,unit:"kg/main",sets:4,reps:"8-10",zone:"Hypertrophie",
     note:"Déplacé en 1er : chaîne postérieure fraîche sur le mouvement technique lourd."},
    {id:"ht",name:"Hip Thrust machine",muscle:"Fessiers",w:70,unit:"kg",sets:4,reps:"10-12",zone:"Hypertrophie",
     note:"Maintenant 2e : fessiers pré-activés par le RDL → meilleur recrutement."},
    {id:"lca",name:"Leg Curl assis",muscle:"Ischio-jambiers",w:35,unit:"kg",sets:3,reps:"15-20",zone:"Métabolique"},
    {id:"fmv",name:"Fentes marchées",muscle:"Quad / Fessiers",w:10,unit:"kg/main",sets:3,reps:"10/jambe",zone:"Hypertrophie"},
    {id:"mol",name:"Mollets machine",muscle:"Mollets",w:50,unit:"kg",sets:4,reps:"15-20",zone:"Métabolique"},
    {id:"rj",name:"Relevés de jambes",muscle:"Abdominaux bas",w:0,unit:"pds corps",sets:3,reps:"12-15",zone:"Hypertrophie"},
    {id:"fc",name:"Farmer's carry",muscle:"Avant-bras / Core",w:18,unit:"kg/main",sets:3,reps:"25m",zone:"Avant-bras"},
    {id:"hiit_v",name:"HIIT Skillmill",muscle:"Cardio",w:6,unit:"intervalles",sets:1,reps:"6×40s",zone:"Cardio",isCardio:true},
  ]},
];
const MUSCLES=["Pectoraux","Dos","Épaules","Triceps","Biceps","Avant-bras","Quadriceps","Ischio-jambiers","Fessiers","Abdominaux","Mollets","Core"];
function mg(m){
  if(m.includes("Pect"))return"Pectoraux";if(m.includes("Dos"))return"Dos";
  if(m.includes("Delt")||m.includes("paul"))return"Épaules";if(m.includes("Tric"))return"Triceps";
  if(m.includes("Bic")||m.includes("Brach"))return"Biceps";if(m.includes("Avant"))return"Avant-bras";
  if(m.includes("Quad"))return"Quadriceps";if(m.includes("Ischio"))return"Ischio-jambiers";
  if(m.includes("Fess"))return"Fessiers";if(m.includes("Abdo"))return"Abdominaux";
  if(m.includes("Molet"))return"Mollets";return"Core";
}

// ── STATE ─────────────────────────────────────────────────────────────────
let S={},H=[],aDay=0,pending=null,selExo=null;

function defaultSets(ex){
  return Array.from({length:ex.sets},()=>({w:ex.w,reps:ex.reps.split("-")[0]||ex.reps,rpe:0,done:false}));
}
function initS(){
  const now=new Date(),dow=now.getDay(),diff=dow===0?-6:1-dow;
  const mon=new Date(now);mon.setDate(now.getDate()+diff);
  const s={weekNum:1,startDate:mon.toISOString().split("T")[0],notes:{}};
  DAYS.forEach(d=>{s[d.id]={};d.exos.forEach(e=>{
    s[d.id][e.id]=e.isCardio?{done:false}:{sets:defaultSets(e)};
  });});
  return s;
}
function load(){
  try{const s=localStorage.getItem("bk6");S=s?JSON.parse(s):initS();}catch{S=initS();}
  if(!S.notes)S.notes={};
  try{const h=localStorage.getItem("bk6h");H=h?JSON.parse(h):[];}catch{H=[];}
  DAYS.forEach(d=>d.exos.forEach(e=>{
    const es=S[d.id]?.[e.id];
    if(!e.isCardio&&es&&!es.sets){S[d.id][e.id]={sets:defaultSets(e)};}
  }));
}
function save(){localStorage.setItem("bk6",JSON.stringify(S));localStorage.setItem("bk6h",JSON.stringify(H));}
function fd(iso){return new Date(iso).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"});}
function ad(iso,n){const d=new Date(iso);d.setDate(d.getDate()+n);return d.toISOString().split("T")[0];}
function poly(n){return POLY.some(p=>n.includes(p));}
function restLbl(z){const s=REST_T[z]||90;return s>=60?`${s/60}min`:`${s}s`;}

// ── PERF CALCULATIONS ──────────────────────────────────────────────────────
function dayPg(id){
  const day=DAYS.find(d=>d.id===id);let done=0,tot=0;
  day.exos.forEach(e=>{
    if(e.isCardio){tot++;if(S[id][e.id]?.done)done++;}
    else{const sets=S[id][e.id]?.sets||[];tot+=sets.length;done+=sets.filter(s=>s.done).length;}
  });
  return{done,tot,pct:tot?Math.round(done/tot*100):0};
}

// fatigue score: ratio of reps achieved vs target, for done sets
function dayFatigue(id){
  const day=DAYS.find(d=>d.id===id);
  let rpeTotal=0,rpeCount=0,repRatio=0,repCount=0;
  day.exos.forEach(e=>{
    if(e.isCardio)return;
    const sets=S[id][e.id]?.sets||[];
    sets.filter(s=>s.done).forEach(s=>{
      if(s.rpe>0){rpeTotal+=s.rpe;rpeCount++;}
      const target=parseFloat(e.reps.split("-")[1]||e.reps.split("-")[0]||e.reps)||12;
      const actual=parseFloat(s.reps)||0;
      repRatio+=Math.min(1,actual/target);repCount++;
    });
  });
  return{
    avgRpe:rpeCount?Math.round(rpeTotal/rpeCount*10)/10:null,
    repEff:repCount?Math.round(repRatio/repCount*100):null
  };
}

function exoPerf(dId,eId){
  const sets=S[dId]?.[eId]?.sets||[];
  const done=sets.filter(s=>s.done);
  if(!done.length)return null;
  const avgW=done.reduce((a,s)=>a+s.w,0)/done.length;
  const avgRpe=done.filter(s=>s.rpe>0).length?done.filter(s=>s.rpe>0).reduce((a,s)=>a+s.rpe,0)/done.filter(s=>s.rpe>0).length:null;
  return{avgW,avgRpe,doneCount:done.length};
}

// ── TIMER ─────────────────────────────────────────────────────────────────
let tIv=null,tTotal=0,tLeft=0,tPaused=false;
const CIRC=2*Math.PI*80;
function startTimer(exo){
  const sec=REST_T[exo.zone]||90;if(!sec){showBankai();return;}
  tTotal=sec;tLeft=sec;tPaused=false;
  document.getElementById("tName").textContent=exo.name.toUpperCase();
  document.getElementById("tPause").textContent="⏸";
  document.getElementById("tOv").classList.add("open");
  updT();clearInterval(tIv);tIv=setInterval(tick,1000);
}
function tick(){if(tPaused)return;tLeft--;if(tLeft<=0){tLeft=0;updT();clearInterval(tIv);closeTimer();showBankai();return;}updT();}
function updT(){
  const m=Math.floor(tLeft/60),s=tLeft%60;
  document.getElementById("tTime").textContent=`${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
  const r=tTotal>0?tLeft/tTotal:0,off=CIRC*(1-r);
  const p=document.getElementById("tProg");p.style.strokeDashoffset=off;
  const ratio=1-r;
  p.style.stroke=ratio<.5?"#597081":ratio<.8?"#9db3c0":"#D2D2D2";
}
function togglePause(){tPaused=!tPaused;document.getElementById("tPause").textContent=tPaused?"▶":"⏸";}
function skipTimer(){clearInterval(tIv);closeTimer();showBankai();}
function closeTimer(){document.getElementById("tOv").classList.remove("open");clearInterval(tIv);}
function adj(s){tLeft=Math.max(5,tLeft+s);if(s>0)tTotal=Math.max(tTotal,tLeft);updT();}

// ── BANKAI ────────────────────────────────────────────────────────────────
function showBankai(){
  if(navigator.vibrate)navigator.vibrate([80,40,80,40,250]);
  document.getElementById("bkOv").classList.add("open");
  setTimeout(closeBankai,4500);
}
function closeBankai(){document.getElementById("bkOv").classList.remove("open");}

// ── RENDER ────────────────────────────────────────────────────────────────
function render(){
  const day=DAYS[aDay],pg=dayPg(day.id),fat=dayFatigue(day.id);
  const note=S.notes[day.id]||"";
  
  // fatigue chips
  let fatHtml="";
  if(fat.avgRpe!==null){
    const rpeC=fat.avgRpe>=9?"#D2D2D2":fat.avgRpe>=7?"#9db3c0":"#597081";
    const rpeBg=fat.avgRpe>=9?"rgba(210,210,210,.1)":fat.avgRpe>=7?"rgba(89,112,129,.1)":"rgba(89,112,129,.06)";
    fatHtml+=`<span class="f-chip" style="color:${rpeC};background:${rpeBg};border-color:${rpeC}">RPE moy. ${fat.avgRpe}</span>`;
  }
  if(fat.repEff!==null){
    const effC=fat.repEff>=90?"#9db3c0":fat.repEff>=70?"#7a95a8":"#597081";
    const effBg=fat.repEff>=90?"rgba(89,112,129,.1)":"rgba(89,112,129,.06)";
    fatHtml+=`<span class="f-chip" style="color:${effC};background:${effBg};border-color:${effC}">Eff. reps ${fat.repEff}%</span>`;
  }

  document.getElementById("root").innerHTML=`
  <div class="hdr">
    <div class="hdr-glass">
      <div class="hdr-inner">
        <div class="hdr-top">
          <div class="logo">
            <div class="logo-icon">⚔️</div>
            <div class="logo-text">BANKAI</div>
          </div>
          <div class="week-pill">
            <div class="week-num">S${S.weekNum}</div>
            <div class="week-date">${fd(S.startDate)} → ${fd(ad(S.startDate,6))}</div>
          </div>
          <div class="hdr-actions">
            <button class="act-btn" onclick="openRecap()">📊</button>
            <button class="act-btn" onclick="openHistory()">📈</button>
            <button class="act-btn" onclick="resetDay('${day.id}')">↺</button>
            <button class="act-btn act-btn-next" onclick="openNext()">SEM+</button>
          </div>
        </div>
        <div class="tabs-wrap">
          ${DAYS.map((d,i)=>`
            <button class="tab ${i===aDay?"active":""}" onclick="switchDay(${i})">${d.label}</button>
          `).join("")}
        </div>
      </div>
    </div>
  </div>
  <div class="fatigue-bar">
    <div class="fatigue-inner">
      <div class="pg-row">
        <div style="display:flex;align-items:baseline;gap:4px">
          <span class="pg-done">${pg.done}</span>
          <span class="pg-total">/ ${pg.tot} séries</span>
        </div>
        <span class="pg-pct">${pg.pct}%</span>
      </div>
      <div class="pg-track"><div class="pg-fill" style="width:${pg.pct}%"></div></div>
      <div class="fatigue-row">
        <span class="fatigue-lbl">${day.label} — ${day.sub}</span>
        <div class="fatigue-chips">${fatHtml}</div>
      </div>
    </div>
  </div>
  <div class="grid">
    ${day.exos.map(e=>renderCard(e,day)).join("")}
    <div class="card" style="border-color:rgba(89,112,129,.18)">
      <div class="card-line"></div>
      <div class="card-body">
        <div style="font-family:'Bebas Neue';font-size:.9rem;letter-spacing:2px;color:var(--steel2)">NOTE SÉANCE</div>
        <textarea class="note-area" id="noteArea" placeholder="Ressenti, douleurs, contexte (sommeil, stress)…">${note}</textarea>
        <button class="note-save-btn" onclick="saveNote('${day.id}')">SAUVEGARDER NOTE ✓</button>
      </div>
    </div>
  </div>`;
}

function rpeColor(v){
  if(!v)return"rgba(89,112,129,.3)";
  if(v>=9)return"#D2D2D2";if(v>=7)return"#9db3c0";return"#597081";
}

function renderCard(ex,day){
  const z=ZONES[ex.zone],rl=restLbl(ex.zone);
  
  if(ex.isCardio){
    const done=S[day.id][ex.id]?.done;
    return`<div class="card" style="border-color:${z.border}">
      <div class="card-line"></div>
      <div class="card-body">
        <div class="card-head">
          <div><div class="card-name">${ex.name}</div><div class="card-muscle">${ex.muscle}</div></div>
          <span class="zone-badge" style="background:${z.bg};color:${z.color};border-color:${z.border}">${ex.zone}</span>
        </div>
        <div style="display:flex;align-items:center;gap:10px;padding:8px 0">
          <div class="set-check ${done?"checked":""}" onclick="togCardio('${day.id}','${ex.id}')">✓</div>
          <span style="font-size:.75rem;color:var(--muted2)">${ex.reps} — ${ex.w} ${ex.unit}</span>
        </div>
        ${ex.note?`<div style="font-size:.62rem;color:var(--muted);font-style:italic;padding:0 2px">${ex.note}</div>`:""}
      </div>
    </div>`;
  }
  
  const sets=S[day.id][ex.id]?.sets||defaultSets(ex);
  const perf=exoPerf(day.id,ex.id);
  
  // Perf mini-summary (avgRpe + doneCount)
  let perfHtml="";
  if(perf){
    const avgRpeC=perf.avgRpe?(perf.avgRpe>=9?"#D2D2D2":perf.avgRpe>=7?"#9db3c0":"#7a95a8"):"var(--muted)";
    perfHtml=`<div class="card-perf">
      <div class="perf-item">
        <span class="perf-val" style="color:var(--light2)">${perf.doneCount}/${ex.sets}</span>
        <span class="perf-lbl">SÉRIES</span>
      </div>
      <div class="perf-sep"></div>
      <div class="perf-item">
        <span class="perf-val" style="color:var(--steel2)">${perf.avgW.toFixed(1)}</span>
        <span class="perf-lbl">KG MOY</span>
      </div>
      <div class="perf-sep"></div>
      <div class="perf-item">
        <span class="perf-val" style="color:${avgRpeC}">${perf.avgRpe?perf.avgRpe.toFixed(1):"—"}</span>
        <span class="perf-lbl">RPE MOY</span>
      </div>
    </div>`;
  }
  
  const rows=sets.map((s,i)=>{
    const rpeC=rpeColor(s.rpe);
    return`<div class="set-row ${s.done?"done-row":""}">
      <span class="set-num">${i+1}</span>
      <input class="set-input ${s.done?"done-input":""}" type="number" step="0.5" value="${s.w}"
        onchange="setVal('${day.id}','${ex.id}',${i},'w',this.value)"
        style="border-color:${s.done?"rgba(89,112,129,.35)":"rgba(89,112,129,.18)"}">
      <input class="set-input ${s.done?"done-input":""}" type="number" min="0" max="50" value="${s.reps}"
        onchange="setVal('${day.id}','${ex.id}',${i},'reps',this.value)"
        style="border-color:${s.done?"rgba(89,112,129,.35)":"rgba(89,112,129,.18)"}">
      <div class="rpe-input-wrap">
        <input class="rpe-input" type="number" min="0" max="10" value="${s.rpe||""}" placeholder="—"
          onchange="setVal('${day.id}','${ex.id}',${i},'rpe',this.value)"
          style="border-color:${s.rpe?rpeC:"rgba(89,112,129,.18)"};color:${s.rpe?rpeC:"var(--muted2)"}">
      </div>
      <div class="set-check ${s.done?"checked":""}" onclick="togSet('${day.id}','${ex.id}',${i})">✓</div>
    </div>`;
  }).join("");
  
  return`<div class="card" style="border-color:${z.border}">
    <div class="card-line"></div>
    <div class="card-body">
      <div class="card-head">
        <div><div class="card-name">${ex.name}</div><div class="card-muscle">${ex.muscle}</div></div>
        <span class="zone-badge" style="background:${z.bg};color:${z.color};border-color:${z.border}">${ex.zone}</span>
      </div>
      ${ex.note?`<div style="font-size:.62rem;color:var(--muted);font-style:italic;padding:0 2px;border-left:2px solid var(--steel);padding-left:7px">${ex.note}</div>`:""}
      ${perfHtml}
      <div class="sets-table">
        <div class="sets-header">
          <span>SÉR.</span><span>KG</span><span>REPS</span><span>RPE</span><span></span>
        </div>
        ${rows}
      </div>
      <div class="timer-btn" onclick="startTimer(${JSON.stringify({id:ex.id,name:ex.name,zone:ex.zone}).replace(/"/g,'&quot;')})">
        <div class="timer-btn-l">
          <div class="timer-icon">⏱</div>
          <span>Récupération</span>
        </div>
        <span class="timer-dur">${rl}</span>
      </div>
    </div>
  </div>`;
}

// ── INTERACTIONS ──────────────────────────────────────────────────────────
function switchDay(i){aDay=i;render();}

function togSet(dId,eId,idx){
  const sets=S[dId][eId].sets;
  sets[idx].done=!sets[idx].done;
  save();render();
}
function togCardio(dId,eId){
  S[dId][eId].done=!S[dId][eId].done;
  save();render();
}
function setVal(dId,eId,idx,key,val){
  const sets=S[dId][eId].sets;
  sets[idx][key]=key==="rpe"?Math.min(10,Math.max(0,parseFloat(val)||0)):(parseFloat(val)||0);
  save();render();
}
function resetDay(dId){
  DAYS.find(d=>d.id===dId).exos.forEach(e=>{
    if(e.isCardio)S[dId][e.id].done=false;
    else S[dId][e.id].sets=defaultSets(e);
  });
  if(S.notes)delete S.notes[dId];
  save();render();
}
function saveNote(dId){
  if(!S.notes)S.notes={};
  const val=document.getElementById("noteArea")?.value||"";
  S.notes[dId]=val;
  save();
  const btn=document.querySelector(".note-save-btn");
  if(btn){btn.textContent="SAUVEGARDÉ ✓";btn.style.color="var(--steel2)";setTimeout(()=>{btn.textContent="SAUVEGARDER NOTE ✓";btn.style.color="";},1500);}
}

// ── NEXT WEEK ─────────────────────────────────────────────────────────────
function calcChanges(){
  const r={};
  DAYS.forEach(d=>{r[d.id]=d.exos.map(e=>{
    if(e.isCardio)return{id:e.id,name:e.name,oldW:e.w,newW:e.w,delta:0,status:"→",reason:"Cardio"};
    const sets=S[d.id][e.id]?.sets||[];
    const doneSets=sets.filter(s=>s.done).length;
    const all=doneSets>=e.sets,half=doneSets>=Math.ceil(e.sets/2);
    let delta=all?(poly(e.name)?5:2.5):half?0:-2.5;
    const doneW=sets.filter(s=>s.done).map(s=>s.w);
    const avgW=doneW.length?doneW.reduce((a,b)=>a+b,0)/doneW.length:e.w;
    const newW=Math.max(0,avgW+delta);
    return{id:e.id,name:e.name,oldW:avgW.toFixed(1),newW:newW.toFixed(1),delta,status:delta>0?"↑":delta<0?"↓":"→",reason:all?"Toutes ✓":half?"Min. ok":"Min. ✗"};
  });});
  return r;
}
function openNext(){
  pending=calcChanges();
  document.getElementById("nextSub").textContent=`Changements de charge → Semaine ${S.weekNum+1}`;
  document.getElementById("nextContent").innerHTML=DAYS.map(d=>`
    <div class="day-grp">
      <div class="day-grp-title"><div class="day-dot"></div>${d.label} · ${d.sub}</div>
      ${pending[d.id].map(c=>`
        <div class="ch-item">
          <span class="ch-name">${c.name}</span>
          <span class="ch-w">${c.oldW} → ${c.newW}${c.reason!=="Cardio"?" kg":""}</span>
          <span class="st-badge" style="background:${c.status==="↑"?"rgba(210,210,210,.12)":c.status==="↓"?"rgba(89,112,129,.12)":"rgba(89,112,129,.08)"};color:${c.status==="↑"?"#D2D2D2":c.status==="↓"?"#597081":"#9db3c0"}">${c.status}</span>
          <span class="ch-reason">${c.reason}</span>
        </div>`).join("")}
    </div>`).join("");
  openSheet("nextOv");
}
function confirmNext(){
  // save notes history too
  const snap=JSON.parse(JSON.stringify(S));snap._label=`S${S.weekNum}`;
  H=[...H.slice(-11),snap];
  DAYS.forEach(d=>pending[d.id].forEach(c=>{
    if(!S[d.id][c.id].sets)return;
    const newW=parseFloat(c.newW);
    S[d.id][c.id].sets=S[d.id][c.id].sets.map(s=>({...s,w:newW,done:false,rpe:0}));
  }));
  S.notes={};
  S.weekNum++;S.startDate=ad(S.startDate,7);
  save();closeSheet("nextOv");render();
}

// ── HISTORY ───────────────────────────────────────────────────────────────
function openHistory(){
  const all=DAYS.flatMap(d=>d.exos.filter(e=>!e.isCardio));
  if(!selExo)selExo=all[0].id;
  renderHist();openSheet("histOv");
}
function renderHist(){
  const all=DAYS.flatMap(d=>d.exos.filter(e=>!e.isCardio));
  const ex=all.find(e=>e.id===selExo)||all[0];
  const data=H.map((snap,i)=>{
    let w=null,rpe=null;
    DAYS.forEach(d=>{
      const es=snap[d.id]?.[selExo];
      if(es?.sets){
        const ws=es.sets.map(s=>s.w);w=ws.reduce((a,b)=>a+b,0)/ws.length;
        const rpes=es.sets.filter(s=>s.rpe>0).map(s=>s.rpe);
        if(rpes.length)rpe=rpes.reduce((a,b)=>a+b,0)/rpes.length;
      }
    });
    return{l:snap._label||`S${i+1}`,w,rpe};
  }).filter(d=>d.w!=null).slice(-6);
  const maxW=data.length?Math.max(...data.map(d=>d.w),1):1;
  const maxRpe=10;

  // build RPE trend bars
  const rpeBars=data.length>=2&&data.some(d=>d.rpe)?`
    <div style="margin-top:14px">
      <div class="chart-ttl" style="margin-bottom:8px">RPE MOYEN</div>
      <div class="rpe-mini">${data.map(d=>`
        <div class="rpe-col">
          ${d.rpe?`<div style="font-size:.55rem;color:var(--steel2)">${d.rpe.toFixed(1)}</div>`:""}
          <div class="rpe-bar" style="height:${d.rpe?Math.max(4,d.rpe/maxRpe*36):4}px;background:${d.rpe>=9?"rgba(210,210,210,.4)":d.rpe>=7?"rgba(122,149,168,.4)":"rgba(89,112,129,.3)"}"></div>
          <div class="rpe-lbl">${d.l}</div>
        </div>`).join("")}
      </div>
    </div>`:"";

  document.getElementById("histContent").innerHTML=`
    <select class="exo-sel" onchange="selExo=this.value;renderHist()">
      ${DAYS.map(d=>`<optgroup label="${d.label} – ${d.sub}">${d.exos.filter(e=>!e.isCardio).map(e=>`<option value="${e.id}" ${e.id===selExo?"selected":""}>${e.name}</option>`).join("")}</optgroup>`).join("")}
    </select>
    <div class="chart-card">
      <div class="chart-ttl">${ex.name} — CHARGE (kg)</div>
      ${data.length<2?`<div style="color:var(--muted);font-size:.78rem;text-align:center;padding:20px">Complète 2+ semaines pour voir la progression.</div>`:`
      <div class="mini-chart">${data.map(d=>`
        <div class="bar-col">
          <div class="bar-v">${Math.round(d.w*10)/10}</div>
          <div class="bar-r" style="height:${Math.max(8,d.w/maxW*70)}px"></div>
          <div class="bar-l">${d.l}</div>
        </div>`).join("")}
      </div>${rpeBars}`}
    </div>
    ${H.length?`<div class="chips">${H.slice(-6).map((snap,i)=>{
      let w=null;
      DAYS.forEach(d=>{const es=snap[d.id]?.[selExo];if(es?.sets){const ws=es.sets.map(s=>s.w);w=ws.reduce((a,b)=>a+b,0)/ws.length;}});
      return`<div class="chip"><span class="chip-l">${snap._label||"S"+(i+1)}</span>${w!=null?(Math.round(w*10)/10)+" "+ex.unit:"—"}</div>`;
    }).join("")}</div>`:""}`;
}

// ── RECAP ─────────────────────────────────────────────────────────────────
function openRecap(){
  const vol={};MUSCLES.forEach(m=>{vol[m]=0;});
  DAYS.forEach(d=>d.exos.forEach(e=>{if(e.isCardio)return;const g=mg(e.muscle);vol[g]=(vol[g]||0)+e.sets;}));
  const maxV=Math.max(...Object.values(vol),1);

  // collect notes from history
  const notesHistory=H.slice(-4).map(snap=>({
    label:snap._label||"Sem.",
    notes:Object.entries(snap.notes||{}).filter(([,v])=>v).map(([k,v])=>({day:k,text:v}))
  })).filter(s=>s.notes.length).reverse();

  const notesHtml=notesHistory.length?`
    <div class="recap-card">
      <div class="recap-ttl">JOURNAL DES SÉANCES</div>
      ${notesHistory.map(s=>s.notes.map(n=>`
        <div class="note-hist-item">
          <div class="note-hist-date">${s.label} · ${n.day.toUpperCase()}</div>
          <div class="note-hist-text">${n.text}</div>
        </div>`).join("")).join("")}
    </div>`:"";

  document.getElementById("recapSub").textContent=`S${S.weekNum} · ${fd(S.startDate)} → ${fd(ad(S.startDate,6))}`;
  document.getElementById("recapContent").innerHTML=`
    <div class="recap-card">
      <div class="recap-ttl">VOLUME PAR GROUPE MUSCULAIRE</div>
      ${MUSCLES.filter(m=>vol[m]>0).map(m=>`
        <div class="vol-item">
          <div class="vol-top"><span>${m}</span><span class="vol-val">${vol[m]} séries</span></div>
          <div class="vol-track"><div class="vol-fill" style="width:${vol[m]/maxV*100}%"></div></div>
        </div>`).join("")}
    </div>
    <div class="recap-card">
      <div class="recap-ttl">SURCHARGE PROGRESSIVE</div>
      ${[{sym:"↑",col:"#D2D2D2",t:"Poly +5kg / Isolation +2.5kg — toutes séries ✓"},{sym:"→",col:"#9db3c0",t:"Même charge — reps minimales atteintes"},{sym:"↓",col:"#597081",t:"−2.5kg — reps minimales non atteintes"}].map(r=>`
        <div class="rule-item"><span class="rule-sym" style="color:${r.col}">${r.sym}</span><span class="rule-desc">${r.t}</span></div>`).join("")}
    </div>
    ${notesHtml}`;
  openSheet("recapOv");
}

// ── UTILS ─────────────────────────────────────────────────────────────────
function openSheet(id){document.getElementById(id).classList.add("open");}
function closeSheet(id){document.getElementById(id).classList.remove("open");}
document.querySelectorAll(".s-ov").forEach(el=>el.addEventListener("click",e=>{if(e.target===el)el.classList.remove("open");}));

load();render();
</script>
</body>
</html>
